<html lang="en-US">
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
        <title>Rugby Socreboard</title>
    </head>
    <body role="img" aria-role="A rugby union scrum initializing.">
        <div class="container">
            <div class="side-board">
                <h3>HOME</h3>
                <p class="score" id="hscore-el">0</p>
                <div class="buttons">
                    <div class="buttons1">
                        <button class="button" id="penaltyHomeome-btn" onclick="penaltyHome()">Penalty kick<br>(+3)</button>
                        <button class="button" id="dropHome-btn" onclick="dropHome()">Drop goal<br>(+3)</button>
                    </div>
                    <div class="tryButtons">
                        <button class="button try" id="tryHome-btn" onclick="tryHome()">Try!<br>(+5)</button>
                        <div class="buttons2">
                            <button class="button" id="missedHome-btn" onclick="missedHome()">Missed<br>conversion<br>(0)</button>
                            <button class="button" id="conversionHome-btn" onclick="conversionHome()">Conversion<br>(+2)</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="side-board">
                <h3>AWAY</h3>
                <p class="score" id="ascore-el">0</p>
                <div class="buttons">
                    <div class="buttons1">
                        <button class="button" id="penaltyAway-btn" onclick="penaltyAway()">Penalty kick<br>(+3)</button>
                        <button class="button" id="dropAway-btn" onclick="dropAway()">Drop goal<br>(+3)</button>
                    </div>
                    <div class="tryButtons">
                        <button class="button try" id="tryAway-btn" onclick="tryAway()">Try!<br>(+5)</button>
                        <div class="buttons2">
                            <button class="button" id="missedAway-btn" onclick="missedAway()">Missed<br>conversion<br>(0)</button>
                            <button class="button" id="conversionAway-btn" onclick="conversionAway()">Conversion<br>(+2)</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <button id="newgame-btn" onclick="newGame()">NEW GAME</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
